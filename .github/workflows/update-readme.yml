name: Real-Time README Update

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:

  # ── JOB 1: Regenerate the contribution snake animation ──────────────
  snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: doanane
          outputs: |
            dist/snake-dark.svg?palette=github-dark
            dist/snake-light.svg

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── JOB 2: Update the dynamic stats section in README ───────────────
  readme-stats:
    name: Update README Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run stats update script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: doanane
        run: python .github/scripts/update_stats.py

      - name: Commit updated README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "readme(auto): stats refreshed [skip ci]"
          git push
