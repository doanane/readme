name: Real-Time GitHub Metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:

  # ── METRICS IMAGES (stats, languages, activity) ────────────────────
  metrics:
    name: Generate Metrics SVGs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Overview stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: doanane
          template: classic
          base: header, activity, community, repositories
          config_timezone: Africa/Accra
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_threshold: 0%
          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_limit: 10
          plugin_activity_filter: all
          plugin_activity_visibility: all
          output_action: commit
          filename: metrics.overview.svg
          committer_branch: output
          committer_message: "metrics(auto): overview refreshed [skip ci]"

      - name: Language breakdown
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: doanane
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          output_action: commit
          filename: metrics.languages.svg
          committer_branch: output
          committer_message: "metrics(auto): languages refreshed [skip ci]"

  # ── CONTRIBUTION SNAKE ─────────────────────────────────────────────
  snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: doanane
          outputs: |
            dist/snake-dark.svg?palette=github-dark
            dist/snake-light.svg

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── LIVE README STAT BADGES ────────────────────────────────────────
  readme-stats:
    name: Update README Live Stat Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run live stats updater
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python .github/scripts/update_stats.py

      - name: Commit refreshed README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "readme(auto): live stats updated [skip ci]"
          git push
